<!DOCTYPE html>
<html>
<head>
    <title>STC Availability</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: white;
        }

        h1 {
            text-align: center;
        }

        #calendar {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
        }

        .day {
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }

        .green {
            background: #d5f5d5;
        }

        .amber {
            background: #ffe7b3;
        }

        .red {
            background: #ffd6d6;
        }

        .date {
            font-weight: bold;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

<h1>STC Availability</h1>

<div id="calendar"></div>

<script>

fetch('availability.json')
.then(response => response.json())
.then(data => {

    const calendar = document.getElementById('calendar');

    const firstDate = new Date(data[0].date);

    const year = firstDate.getFullYear();
    const month = firstDate.getMonth();

    const monthName = firstDate.toLocaleString(
        'default',
        { month: 'long' }
    );

    // Build fast lookup table
    const availability = {};

    data.forEach(day => {
        availability[day.date] = day.status;
    });

    const daysInMonth = new Date(
        year,
        month + 1,
        0
    ).getDate();

    let html = `
        <h2>${monthName} ${year}</h2>

        <div class="grid">
            <div class="header">Mon</div>
            <div class="header">Tue</div>
            <div class="header">Wed</div>
            <div class="header">Thu</div>
            <div class="header">Fri</div>
            <div class="header">Sat</div>
            <div class="header">Sun</div>
    `;

    const firstDay = new Date(year, month, 1);

    let startDay = firstDay.getDay();

    if (startDay === 0)
    {
        startDay = 7;
    }

    for(let i = 1; i < startDay; i++)
    {
        html += '<div class="empty"></div>';
    }

    for(let day = 1; day <= daysInMonth; day++)
    {
        const dateString =
            `${year}-${String(month + 1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

        let status = availability[dateString] || 'unknown';

        html += `
            <div class="day ${status}">
                <div class="number">${day}</div>
            </div>
        `;
    }

    html += '</div>';

    calendar.innerHTML = html;

})
.catch(error => {

    document.getElementById('calendar').innerHTML =
        '<p>Unable to load availability data.</p>';

    console.error(error);

});

</script>

<style>

body{
    font-family:Segoe UI,Arial,sans-serif;
    max-width:900px;
    margin:auto;
    padding:20px;
}

h1,h2{
    text-align:center;
}

.grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:5px;
}

.header{
    text-align:center;
    font-weight:bold;
    padding:8px;
}

.day{
    height:80px;
    border-radius:6px;
    position:relative;
}

.number{
    position:absolute;
    top:8px;
    right:10px;
    font-weight:bold;
}

.green{
    background:#d4edda;
}

.amber{
    background:#fff3cd;
}

.red{
    background:#f8d7da;
}

.unknown{
    background:#efefef;
}

.empty{
    background:none;
}

</style>

</body>
</html>
