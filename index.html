<!DOCTYPE html>
<html>
<head>

<title>STC Availability</title>

<style>

body{
    font-family:Segoe UI,Arial,sans-serif;
    max-width:1000px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
}

.month-nav{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    margin-bottom:15px;
}

.month-nav button{
    padding:8px 16px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    background:#005eaa;
    color:white;
}

.legend{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.legend-item{
    display:flex;
    align-items:center;
    gap:6px;
}

.legend-box{
    width:16px;
    height:16px;
    border-radius:3px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:5px;
}

.header{
    text-align:center;
    font-weight:bold;
    padding:8px;
}

.day{
    height:80px;
    border-radius:6px;
    position:relative;
    border:1px solid #ccc;
    cursor:pointer;
}

.number{
    position:absolute;
    top:8px;
    right:10px;
    font-weight:bold;
}

.green{
    background:#d4edda;
}

.amber{
    background:#fff3cd;
}

.red{
    background:#f8d7da;
}

.unknown{
    background:#efefef;
}

.empty{
    background:none;
    border:none;
}

@media (max-width: 600px)
{
    .day{
        height:60px;
    }
}

#monthSelect{
    padding:8px 12px;
    border-radius:5px;
    border:1px solid #ccc;
}

#monthTitle{
    min-width:160px;
    text-align:center;
}

.month-nav button:disabled{
    opacity:0.4;
    cursor:not-allowed;
}

</style>
    
</head>
<body>

<h1>STC Availability</h1>

<div class="legend">
    <div class="legend-item">
        <span class="legend-box green"></span>
        Available
    </div>

    <div class="legend-item">
        <span class="legend-box amber"></span>
        Limited Availability
    </div>

    <div class="legend-item">
        <span class="legend-box red"></span>
        Unavailable
    </div>
</div>

<div class="month-nav">
    <button id="prevMonth">◀</button>

    <h2 id="monthTitle"></h2>

    <select id="monthSelect"></select>

    <button id="nextMonth">▶</button>
</div>

<div id="calendar"></div>

<script>

let availabilityData = [];
let currentMonth = null;
let currentYear = null;

let minMonth = null;
let minYear = null;

fetch('availability.json')
.then(response => response.json())
.then(data => {

    availabilityData = data;

    const firstDate = new Date(data[0].date);

    currentMonth = firstDate.getMonth();
    currentYear = firstDate.getFullYear();

    minMonth = currentMonth;
    minYear = currentYear;

    populateMonthDropdown();
    renderCalendar();

});

function getCurrentMonthKey()
{
    return `${currentYear}-${String(currentMonth + 1).padStart(2,'0')}`;
}

function updateNavigationButtons()
{
    const months = getAvailableMonths();

    const currentKey = getCurrentMonthKey();

    document.getElementById('prevMonth').disabled =
        currentKey === months[0];

    document.getElementById('nextMonth').disabled =
        currentKey === months[months.length - 1];

    document.getElementById('monthSelect').value = currentKey;
}
    
function getAvailableMonths()
{
    const months = [];

    availabilityData.forEach(day => {

        const d = new Date(day.date);

        const key =
            `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2,'0')}`;

        if(!months.includes(key))
        {
            months.push(key);
        }

    });

    return months.sort();
}

function populateMonthDropdown()
{
    const monthSelect = document.getElementById('monthSelect');

    monthSelect.innerHTML = '';

    const months = getAvailableMonths();

    months.forEach(monthKey => {

        const parts = monthKey.split('-');

        const year = Number(parts[0]);
        const month = Number(parts[1]) - 1;

        const labelDate = new Date(year, month, 1);

        const label =
            labelDate.toLocaleString(
                'default',
                {
                    month:'long',
                    year:'numeric'
                }
            );

        const option = document.createElement('option');

        option.value = monthKey;
        option.textContent = label;

        if(year === currentYear && month === currentMonth)
        {
            option.selected = true;
        }

        monthSelect.appendChild(option);

    });
}
    
function renderCalendar()
{  
    const calendar = document.getElementById('calendar');

    const availability = {};

    availabilityData.forEach(day => {
        availability[day.date] = day;
    });
    const monthName =
        new Date(currentYear,currentMonth,1)
        .toLocaleString('default',{month:'long'});

    document.getElementById('monthTitle').innerText =
        `${monthName} ${currentYear}`;

    const daysInMonth =
        new Date(currentYear,currentMonth+1,0).getDate();

    let html = `
        <div class="grid">

            <div class="header">Mon</div>
            <div class="header">Tue</div>
            <div class="header">Wed</div>
            <div class="header">Thu</div>
            <div class="header">Fri</div>
            <div class="header">Sat</div>
            <div class="header">Sun</div>
    `;

    const firstDay =
        new Date(currentYear,currentMonth,1);

    let startDay = firstDay.getDay();

    if(startDay===0)
    {
        startDay=7;
    }

    for(let i=1;i<startDay;i++)
    {
        html += `<div class="empty"></div>`;
    }

    for(let day=1;day<=daysInMonth;day++)
    {
        const dateString =
            `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

    const dayInfo =
        availability[dateString] || {
            availability:'unknown',
            detail:''
        };

    const status = dayInfo.availability;

        html += `
            <div
                class="day ${status}"
                onclick="showPopup(
                    '${dateString}',
                    '${status}',
                    '${(dayInfo.detail || 'No booking details').replace(/'/g,"&#39;")}'
                )">

                <div class="number">${day}</div>

            </div>
        `;
    }

    html += '</div>';

    calendar.innerHTML = html;

    updateNavigationButtons();
}

function showPopup(date,status,detail)
{
    document.getElementById('popupDate').innerText =
        new Date(date).toLocaleDateString(
            'en-GB',
            {
                weekday:'long',
                day:'numeric',
                month:'long',
                year:'numeric'
            }
        );

    document.getElementById('popupAvailability').innerText =
        status.toUpperCase();
    
    document.getElementById('popupDetail').style.whiteSpace = 'pre-line';
    
    document.getElementById('popupDetail').innerText =
        detail;

    document.getElementById('dayPopup').style.display =
        'block';

    document.getElementById('popupBackground').style.display =
        'block';
}

function closePopup()
{
    document.getElementById('dayPopup').style.display =
        'none';

    document.getElementById('popupBackground').style.display =
        'none';
}

document
.getElementById('prevMonth')
.addEventListener('click', () =>
{
    const months = getAvailableMonths();

    currentMonth--;

    if(currentMonth < 0)
    {
        currentMonth = 11;
        currentYear--;
    }

    if(!months.includes(getCurrentMonthKey()))
    {
        currentMonth++;

        if(currentMonth > 11)
        {
            currentMonth = 0;
            currentYear++;
        }

        return;
    }

    renderCalendar();
});

document
.getElementById('nextMonth')
.addEventListener('click', () =>
{
    const months = getAvailableMonths();

    currentMonth++;

    if(currentMonth > 11)
    {
        currentMonth = 0;
        currentYear++;
    }

    if(!months.includes(getCurrentMonthKey()))
    {
        currentMonth--;

        if(currentMonth < 0)
        {
            currentMonth = 11;
            currentYear--;
        }

        return;
    }

    renderCalendar();
});

document
.getElementById('monthSelect')
.addEventListener('change', event =>
{
    const parts = event.target.value.split('-');

    currentYear = Number(parts[0]);
    currentMonth = Number(parts[1]) - 1;

    renderCalendar();
});
    
</script>
<div id="dayPopup" style="
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
max-width:400px;
z-index:9999;
">

    <h3 id="popupDate"></h3>

    <p id="popupAvailability"></p>

    <p id="popupDetail"></p>

    <button onclick="closePopup()">Close</button>

</div>

<div id="popupBackground" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
z-index:9998;
"
onclick="closePopup()">
</div>
</body>
</html>
